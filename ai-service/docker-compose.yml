services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - EVALUATION_STORE_PATH=/app/data/evaluation
      - PROMPT_STORE_PATH=/app/data/evaluation
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: PostgreSQL for production-like local dev
  postgres:
    image: postgres:16-alpine
    profiles:
      - with-db
    environment:
      POSTGRES_USER: sourcerra
      POSTGRES_PASSWORD: sourcerra
      POSTGRES_DB: sourcerra_ai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcerra"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  postgres_data:
