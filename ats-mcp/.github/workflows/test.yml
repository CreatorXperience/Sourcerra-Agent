name: MCP Test

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "ats-mcp/**"
  push:
    branches: [main]
    paths:
      - "ats-mcp/**"

defaults:
  run:
    working-directory: ats-mcp

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: MyPy check
        run: mypy app/ --strict

  test:
    name: Test (Python ${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcp-coverage-${{ env.PYTHON_VERSION }}
          path: ats-mcp/coverage.xml

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=70

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcp-test-results-${{ env.PYTHON_VERSION }}
          path: ats-mcp/.pytest_cache/
